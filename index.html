<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة متابع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Cairo:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#655ac1",
              secondary: "#8779fb",
              accent: "#e5e1fe",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Tajawal", sans-serif;
        background-color: #fcfbff;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #d4cff5;
        border-radius: 99px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #8779fb;
      }
      @media print {
        .no-print {
          display: none !important;
        }
        }

      /* Custom Scrollbar for Sidebar (White Theme) */
      .custom-scrollbar-white::-webkit-scrollbar {
        width: 5px;
      }
      .custom-scrollbar-white::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
      }
      .custom-scrollbar-white::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 10px;
      }
      .custom-scrollbar-white::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.5);
      }

      /* Range slider styling for print modal */
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: linear-gradient(135deg, #655ac1, #7c6dd6);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(101,90,193,0.4);
        border: 2px solid white;
      }
      input[type='range']::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: linear-gradient(135deg, #655ac1, #7c6dd6);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(101,90,193,0.4);
        border: 2px solid white;
      }
      input[type='range']:focus { outline: none; }
      
      /* Print Styles */
      @media print {
        @page {
            size: landscape;
            margin: 5mm;
        }
        body {
            background-color: white !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }
        /* Hide UI Elements */
        nav, header, aside, .sidebar, .toolbar, .no-print, button, .group\/print {
            display: none !important;
        }
        
        /* Layout overrides */
        .flex.h-screen {
            display: block !important;
            height: auto !important;
            overflow: visible !important;
        }
        .flex-1.overflow-hidden {
            overflow: visible !important;
        }
        .overflow-y-auto, .overflow-x-auto {
            overflow: visible !important;
            height: auto !important;
        }
        
        /* Ensure Grid is visible and readable */
        .schedule-grid-container {
            width: 100% !important;
            direction: rtl !important;
        }
        
        /* Font sizing for print — scoped to avoid conflict with the dynamic print modal */
        h1, h2, h3 {
            font-size: 14pt;
        }
        
        /* Remove shadows and borders */
        .shadow-sm, .shadow-md, .shadow-lg {
            box-shadow: none !important;
        }
        .border {
            border-color: #ddd !important;
        }
      }

      /* ── Task list scrollbar — subtle purple ── */
      .task-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .task-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .task-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(135, 121, 251, 0.25);
        border-radius: 99px;
        transition: background 0.2s;
      }
      .task-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(101, 90, 193, 0.55);
      }

      /* ── Floating badge animation (marketing hero) ── */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

      /* ── Marketing fade-in ── */
      @keyframes marketingFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: marketingFadeIn 0.25s ease-out forwards;
      }

      /* ── Card hover effect — platform-wide ── */
      .bg-white.rounded-2xl.border.border-slate-200.shadow-sm {
        transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
      }
      .bg-white.rounded-2xl.border.border-slate-200.shadow-sm:hover {
        box-shadow: 0 8px 28px -6px rgba(101, 90, 193, 0.14), 0 2px 8px -2px rgba(101, 90, 193, 0.08);
        border-color: rgba(101, 90, 193, 0.22);
        transform: translateY(-1px);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@^19.2.3/",
          "react": "https://esm.sh/react@^19.2.3",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
